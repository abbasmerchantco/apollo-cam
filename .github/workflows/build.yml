name: Build ApolloCam IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project ApolloCam.xcodeproj \
            -target ApolloCam \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "ApolloCam.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "App not found in DerivedData, checking current directory..."
            APP_PATH=$(find . -name "ApolloCam.app" -type d 2>/dev/null | head -1)
          fi
          echo "Found app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r ApolloCam.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ApolloCam-ipa
          path: ApolloCam.ipa
